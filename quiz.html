<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz | The Learning Corner</title>

  <style>
    :root {
      --dark-green: #426b3a;
      --green: #6FAF4F;
      --orange: #D97A2B;
      --light-orange: #f3b37a;
      --cream: #f8f4ea;
      --text: #2f2a24;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: var(--cream);
      color: var(--text);
      padding: 40px;
    }

    h1 {
      color: var(--dark-green);
      margin-bottom: 20px;
    }

    .quiz-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 600px;
    }

    .question {
      margin-bottom: 20px;
    }

    .options label {
      display: block;
      margin-bottom: 10px;
      cursor: pointer;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: var(--dark-green);
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: var(--orange);
    }

    .result {
      margin-top: 20px;
      font-weight: bold;
      color: var(--dark-green);
    }
  </style>
</head>
<body>

  <h1>Quick Quiz</h1>

  <div class="quiz-box">

    <div class="question">
      <p>1. What is 2 + 2?</p>
      <div class="options">
        <label><input type="radio" name="q1" value="3"> 3</label>
        <label><input type="radio" name="q1" value="4"> 4</label>
        <label><input type="radio" name="q1" value="5"> 5</label>
      </div>
    </div>

    <div class="question">
      <p>2. Which is a noun?</p>
      <div class="options">
        <label><input type="radio" name="q2" value="run"> run</label>
        <label><input type="radio" name="q2" value="happy"> happy</label>
        <label><input type="radio" name="q2" value="dog"> dog</label>
      </div>
    </div>

    <button onclick="checkAnswers()">Submit</button>

    <div class="result" id="result"></div>

  </div>

  <script>
    function checkAnswers() {
      let score = 0;
 
      let q1 = document.querySelector('input[name=\"q1\"]:checked');
      let q2 = document.querySelector('input[name=\"q2\"]:checked');

      if (q1 && q1.value === \"4\") score++;
      if (q2 && q2.value === \"dog\") score++;

      document.getElementById(\"result\").innerText = 
        \"Your score: \" + score + \"/2\";
    }
  </script>

</body>
</html>
