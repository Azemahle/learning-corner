<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz | The Learning Corner</title>

  <style>
    :root {
      --dark-green: #426b3a;
      --green: #6FAF4F;
      --orange: #D97A2B;
      --light-orange: #f3b37a;
      --cream: #f8f4ea;
      --soft-cream: #fdfaf3;
      --text: #2f2a24;
      --white: #ffffff;
      --muted: #666;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--cream);
      color: var(--text);
    }

    header {
      background: var(--white);
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 12px;
      background: var(--soft-cream);
      padding: 4px;
    }

    .logo-text h2 {
      font-size: 26px;
      color: var(--dark-green);
      line-height: 1.1;
    }

    .logo-text p {
      font-size: 14px;
      color: var(--muted);
    }

    nav {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      transition: 0.3s;
    }

    nav a:hover,
    nav a.active {
      color: var(--orange);
    }

    .hero {
      padding: 60px 50px 30px;
      background: linear-gradient(to right, #f8f4ea, #f3efe4);
    }

    .hero h1 {
      font-size: 52px;
      color: var(--dark-green);
      margin-bottom: 12px;
    }

    .hero p {
      color: var(--muted);
      font-size: 18px;
      max-width: 700px;
      line-height: 1.5;
    }

    .quiz-section {
      padding: 50px;
    }

    .quiz-box {
      background: var(--white);
      max-width: 760px;
      padding: 30px;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .question {
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid #f0ebe1;
    }

    .question:last-of-type {
      border-bottom: none;
    }

    .question p {
      font-size: 20px;
      color: var(--dark-green);
      font-weight: bold;
      margin-bottom: 14px;
    }

    .options label {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
    }

    .submit-btn {
      border: none;
      padding: 14px 24px;
      border-radius: 28px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--dark-green), var(--green));
      transition: 0.3s;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, var(--orange), var(--light-orange));
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: var(--dark-green);
    }

    footer {
      background: var(--white);
      text-align: center;
      padding: 24px;
      border-top: 1px solid #eee;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      header,
      .hero,
      .quiz-section {
        padding-left: 20px;
        padding-right: 20px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      nav {
        gap: 16px;
      }

      .hero h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-box">
      <img src="logo.png" alt="The Learning Corner Logo">
      <div class="logo-text">
        <h2>The Learning Corner</h2>
        <p>with Miss L</p>
      </div>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="notes.html">Notes</a>
      <a href="quiz.html" class="active">Quiz</a>
      <a href="tests.html">Tests</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Fun Quiz Time</h1>
    <p>Try a short activity and see your score straight away.</p>
  </section>

  <section class="quiz-section">
    <div class="quiz-box">
      <div class="question">
        <p>1. What is 2 + 2?</p>
        <div class="options">
          <label><input type="radio" name="q1" value="3"> 3</label>
          <label><input type="radio" name="q1" value="4"> 4</label>
          <label><input type="radio" name="q1" value="5"> 5</label>
        </div>
      </div>

      <div class="question">
        <p>2. Which word is a noun?</p>
        <div class="options">
          <label><input type="radio" name="q2" value="run"> run</label>
          <label><input type="radio" name="q2" value="happy"> happy</label>
          <label><input type="radio" name="q2" value="dog"> dog</label>
        </div>
      </div>

      <button class="submit-btn" onclick="checkAnswers()">Submit Answers</button>
      <div class="result" id="result"></div>
    </div>
  </section>

  <footer>
    <p>The Learning Corner with Miss L • A Cozy Space to Learn and Grow</p>
  </footer>

  <script>
    function checkAnswers() {
      let score = 0;

      const q1 = document.querySelector('input[name="q1"]:checked');
      const q2 = document.querySelector('input[name="q2"]:checked');

      if (q1 && q1.value === "4") score++;
      if (q2 && q2.value === "dog") score++;

      document.getElementById("result").innerText = "Your score: " + score + "/2";
    }
  </script>

</body>
</html>
